<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello I'm Kim Trong</title>
    <style>
        :root {
            --ink: #f7f2e7;
            --gold: #c9ab74;
            --gold-soft: rgba(201, 171, 116, 0.35);
            --navy: #0d1726;
            --charcoal: #151515;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            font-family: "Cormorant Garamond", "Times New Roman", serif;
            background:
                radial-gradient(circle at 14% 18%, var(--gold-soft) 0%, transparent 42%),
                radial-gradient(circle at 84% 82%, rgba(247, 242, 231, 0.08) 0%, transparent 46%),
                linear-gradient(140deg, var(--charcoal) 0%, var(--navy) 45%, #05070b 100%);
            display: grid;
            place-items: center;
            padding: 20px;
            overflow: hidden;
        }

        .intro {
            position: relative;
            text-align: center;
            padding: clamp(20px, 5vw, 52px);
            border: 1px solid rgba(201, 171, 116, 0.3);
            border-radius: 16px;
            background: linear-gradient(160deg, rgba(247, 242, 231, 0.05), rgba(247, 242, 231, 0.01));
            backdrop-filter: blur(1.5px);
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.35),
                inset 0 0 0 1px rgba(247, 242, 231, 0.06);
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 6vw, 4.4rem);
            line-height: 1.08;
            letter-spacing: 0.03em;
            font-weight: 600;
            color: var(--ink);
            text-shadow: 0 0 24px rgba(201, 171, 116, 0.2);
        }

        h1 span {
            color: var(--gold);
        }
    </style>
</head>
<body>
    <main class="intro">
        <h1>Hello I'm <span>Kim Trọng</span></h1>
    </main>
</body>
</html>
